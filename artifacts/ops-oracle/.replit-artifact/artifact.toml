kind = "web"
previewPath = "/"
title = "OpsOracle"
version = "1.0.0"
id = "artifacts/ops-oracle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24501

[services.development]
run = "pnpm --filter @workspace/ops-oracle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ops-oracle", "run", "build" ]
publicDir = "artifacts/ops-oracle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24501"
BASE_PATH = "/"
